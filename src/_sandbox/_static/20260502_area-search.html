<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="自分に最適な場所を見つけるための検索プラットフォーム" />
  <link rel="preconnect" href="https://unpkg.com" />
  <title>ALETHEIA</title>
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <style>
    :root {
      --bg-color: #ffffff;
      --text-color: #333333;
      --accent-color: #0070f3;
      --border-color: #e5e7eb;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: var(--text-color);
      background-color: var(--bg-color);
      line-height: 1.6;
      min-height: 100vh;
    }

    * { box-sizing: border-box; }

    main {
      max-width: 800px;
      margin: 0 auto;
    }

    /* Header Styles (現状維持) */
    .header-container {
      display: flex;
      align-items: center;
      padding: 0 20px;
      height: 64px;
      border-bottom: 1px solid var(--border-color);
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(8px);
      position: sticky;
      top: 0;
      z-index: 50;
      gap: 16px;
    }

    .header-logo {
      font-family: "Times New Roman", serif;
      font-size: 1.15rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: #111827;
      text-decoration: none;
    }

    .header-search-form { flex: 1; }

    .header-search-input-wrapper {
      display: flex;
      align-items: center;
      padding: 0 14px;
      height: 40px;
      border: 1px solid var(--border-color);
      border-radius: 999px;
      background: #ffffff;
    }

    .header-search-input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 0.9rem;
    }

    /* Main Container Styles */
    .top-main-container {
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding: 20px;
    }

    /* 🔑 ここが今回のポイント：横並びの行 */
    .search-bar-row {
      display: flex;
      gap: 12px;
      width: 100%;
    }

    /* エリア選択ドリルダウン（リサイズ後） */
    .search-area-module {
      flex: 1; /* 50%幅 */
      position: relative;
    }

    .search-trigger {
      width: 100%;
      padding: 0 16px;
      height: 48px;
      border-radius: 12px;
      border: 1px solid var(--border-color);
      background: #fff;
      text-align: left;
      font-size: 0.9rem;
      color: #111827;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* 現在地ボタン（リサイズ後） */
    .geo-button {
      flex: 1; /* 50%幅 */
      height: 48px;
      padding: 0 16px;
      border-radius: 12px;
      border: 1px solid #0070f333; /* 控えめなアクセント境界 */
      background: #0070f308; /* 非常に薄い青 */
      color: var(--accent-color);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s ease;
    }

    .geo-button:hover {
      background: #0070f312;
      border-color: var(--accent-color);
    }

    /* 結果リスト（現状維持） */
    .cafe-card {
      display: block;
      text-decoration: none;
      padding: 16px;
      border: 1px solid #eee;
      border-radius: 10px;
      margin-bottom: 8px;
      background: #fff;
    }

    .name { font-weight: 700; color: #111; display: block; }
    .addr { font-size: 0.75rem; color: #555; }
  </style>
</head>
<body>
  <header class="header-container">
    <a href="/" class="header-logo">ALETHEIA</a>
    <form class="header-search-form">
      <div class="header-search-input-wrapper">
        <input type="text" class="header-search-input" placeholder="キーワード検索..">
        <span style="color: #9ca3af;">🔍</span>
      </div>
    </form>
  </header>

  <main>
    <section class="top-main-container">
      
      <!-- 修正ポイント：エリア選択と現在地ボタンの横並び -->
      <div class="search-bar-row">
        <!-- ドリルダウン（半分サイズ） -->
        <div class="search-area-module">
          <button class="search-trigger" type="button">
            <span>📍 神奈川県</span>
            <span style="color: #94a3b8; font-size: 0.8rem;">▼</span>
          </button>
        </div>

        <!-- 現在地反映ボタン（半分サイズ） -->
        <button class="geo-button" type="button">
          <span>🎯</span>
          <span>現在地を反映</span>
        </button>
      </div>

      <!-- 検索結果（サンプル） -->
      <div id="search-result-module">
        <div style="font-size: 0.8rem; color: #64748b; margin-bottom: 8px;">検索結果: 316件</div>
        <a class="cafe-card">
          <span class="name">ドトールコーヒーショップ 関内仲通り店</span>
          <span class="addr">神奈川県横浜市中区 住吉町 ２‐２２</span>
        </a>
        <a class="cafe-card">
          <span class="name">ドトールコーヒーショップ 横浜ジョイナス店</span>
          <span class="addr">神奈川県横浜市西区 南幸 １‐４‐Ｂ１号</span>
        </a>
      </div>

    </section>
  </main>

  <footer style="padding:24px 0; text-align:center; border-top:1px solid #eee;">
    <p style="font-size:0.8rem; color:#94a3b8;">© 2026 ALETHEIA</p>
  </footer>
</body>
</html>
