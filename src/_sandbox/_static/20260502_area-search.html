<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="自分に最適な場所を見つけるための検索プラットフォーム" />
  <title>ALETHEIA</title>
  <style>
    :root {
      --bg-color: #ffffff;
      --text-color: #111827;
      --sub-text-color: #64748b;
      --accent-color: #0070f3;
      --border-color: #e5e7eb;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text-color);
      background-color: var(--bg-color);
      line-height: 1.6;
    }

    * { box-sizing: border-box; }

    main {
      max-width: 800px;
      margin: 0 auto;
    }

    /* Header Styles */
    .header-container {
      display: flex;
      align-items: center;
      padding: 0 20px;
      height: 64px;
      border-bottom: 1px solid var(--border-color);
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(8px);
      position: sticky;
      top: 0;
      z-index: 50;
      gap: 16px;
    }

    .header-logo {
      font-family: "Times New Roman", serif;
      font-size: 1.15rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: var(--text-color);
      text-decoration: none;
    }

    .header-search-form { flex: 1; }

    .header-search-input-wrapper {
      display: flex;
      align-items: center;
      padding: 0 14px;
      height: 40px;
      border: 1px solid var(--border-color);
      border-radius: 999px;
      background: #ffffff;
    }

    .header-search-input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 0.9rem;
    }

    /* Main Content */
    .top-main-container {
      display: flex;
      flex-direction: column;
      gap: 24px;
      padding: 20px;
    }

    /* 操作エリア：エリア選択 & 現在地ボタン */
    .search-bar-row {
      display: flex;
      gap: 12px;
      width: 100%;
    }

    .search-area-module { flex: 1; }

    .search-trigger {
      width: 100%;
      padding: 0 16px;
      height: 48px;
      border-radius: 12px;
      border: 1px solid var(--border-color);
      background: #fff;
      text-align: left;
      font-size: 0.9rem;
      color: var(--text-color);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .geo-button {
      flex: 1;
      height: 48px;
      border-radius: 12px;
      border: 1px solid #0070f333;
      background: #0070f308;
      color: var(--accent-color);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s ease;
    }

    .geo-button:hover {
      background: #0070f312;
      border-color: var(--accent-color);
    }

    /* 🔑 指摘反映：結果メタ情報エリア */
    .result-info-box {
      border-bottom: 1px solid #f1f5f9;
      padding-bottom: 12px;
    }

    .result-meta {
      font-size: 0.75rem;
      color: var(--sub-text-color);
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .result-count {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text-color);
    }

    /* カードリスト */
    .search-results-target {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .cafe-card {
      display: block;
      text-decoration: none;
      padding: 16px;
      border: 1px solid var(--border-color);
      border-radius: 12px;
      background: #fff;
      transition: transform 0.1s ease, border-color 0.2s;
    }

    .cafe-card:hover {
      border-color: #d1d5db;
      background: #fafafa;
    }

    .name { font-weight: 700; color: #111; display: block; margin-bottom: 4px;}
    .addr { font-size: 0.75rem; color: var(--sub-text-color); }
  </style>
</head>
<body>
  <header class="header-container">
    <a href="/" class="header-logo">ALETHEIA</a>
    <form class="header-search-form">
      <div class="header-search-input-wrapper">
        <input type="text" class="header-search-input" placeholder="キーワード検索..">
        <span style="color: #9ca3af;">🔍</span>
      </div>
    </form>
  </header>

  <main>
    <section class="top-main-container">
      
      <!-- エリア操作 -->
      <div class="search-bar-row">
        <div class="search-area-module">
          <button class="search-trigger" type="button">
            <span>📍 神奈川県</span>
            <span style="color: #94a3b8; font-size: 0.8rem;">▼</span>
          </button>
        </div>
        <button class="geo-button" type="button">
          <span>🎯</span>
          <span>現在地を反映</span>
        </button>
      </div>

      <!-- 🔑 改善：検索条件の可視化（result-info-box） -->
      <div class="result-info-box">
        <div class="result-meta">
          <span>📍 神奈川県</span>
          <span style="color:#e2e8f0;">|</span>
          <span>キーワード: なし</span>
        </div>
        <div class="result-count">316件の結果</div>
      </div>

      <!-- 結果リスト -->
      <div class="search-results-target">
        <a class="cafe-card">
          <span class="name">ドトールコーヒーショップ 関内仲通り店</span>
          <span class="addr">神奈川県横浜市中区 住吉町 ２‐２２</span>
        </a>
        <a class="cafe-card">
          <span class="name">ドトールコーヒーショップ 横浜ジョイナス店</span>
          <span class="addr">神奈川県横浜市西区 南幸 １‐４‐Ｂ１号</span>
        </a>
        <a class="cafe-card">
          <span class="name">ドトールコーヒーショップ 石川町店</span>
          <span class="addr">神奈川県横浜市中区 石川町 １‐３</span>
        </a>
      </div>

    </section>
  </main>

  <footer style="padding:32px 0; text-align:center; border-top:1px solid #f1f5f9; margin-top: 40px;">
    <p style="font-size:0.8rem; color:#94a3b8;">© 2026 ALETHEIA</p>
  </footer>
</body>
</html>
